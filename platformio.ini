; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



[env:wt32-eth01]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200
upload_speed = 921600       # Schnellerer Upload (optional)
upload_port = COM4        # Für Upload
monitor_port = COM4       # Für Serial Monitor (optional)
upload_protocol = esptool # Upload-Protokoll (Standard)
build_src_filter = +<*> -<backup1_main.cpp> -<old.ccp>
lib_deps =
    adafruit/Adafruit MPR121
    adafruit/Adafruit MCP23017
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    adafruit/Adafruit PCA9535

; Test Environment für PCA9535 Relais Boards
[env:test_relais]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = COM4
monitor_port = COM4
test_framework = unity
test_filter = test_*
build_src_filter = +<../test/> -<main.cpp> -<network.cpp> -<touchboards.cpp> -<original_backup.cpp>
lib_deps =
    throwtheswitch/Unity

; WiFi AP Relais Web-Interface Test
[env:test_wifi]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = COM4
monitor_port = COM4
build_src_filter = +<../test/test_wifi_relais.cpp> -<main.cpp> -<*.cpp>
lib_deps =