; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



[env:wt32-eth01]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200
upload_speed = 921600       # Schnellerer Upload (optional)
upload_port = /dev/tty.usbserial-0001        # macOS USB Port
monitor_port = /dev/tty.usbserial-0001       # macOS USB Port
upload_protocol = esptool # Upload-Protokoll (Standard)
build_src_filter = +<*> -<backup1_main.cpp> -<old.ccp> -<original_backup.cpp> -<oled_display.cpp> -<menu_system.cpp>
lib_deps =
    adafruit/Adafruit MPR121
    adafruit/Adafruit MCP23017 Arduino Library
    paulstoffregen/OneWire
    milesburton/DallasTemperature

; OTA Upload Environment (Over-The-Air Updates via Ethernet)
[env:wt32-eth01-ota]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200
upload_protocol = espota
upload_port = 192.168.178.194       # IP-Adresse des WT32-ETH01
upload_flags =
    --host_port=3232
    --auth=WT32_SecureOTA_2024      # OTA Passwort (siehe main.cpp)
build_src_filter = +<*> -<backup1_main.cpp> -<old.ccp> -<original_backup.cpp> -<oled_display.cpp> -<menu_system.cpp>
lib_deps =
    adafruit/Adafruit MPR121
    adafruit/Adafruit MCP23017 Arduino Library
    paulstoffregen/OneWire
    milesburton/DallasTemperature

; Test Environment für PCA9535 Relais Boards
[env:test_relais]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = COM4
monitor_port = COM4
test_framework = unity
test_filter = test_*
build_src_filter = +<../test/> -<main.cpp> -<network.cpp> -<touchboards.cpp> -<original_backup.cpp>
lib_deps =
    throwtheswitch/Unity

; WiFi AP Relais Web-Interface Test
[env:test_wifi]
platform = espressif32
board = wt32-eth01
